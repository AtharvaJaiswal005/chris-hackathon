<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidepanel.css">
  <title>HackExt</title>
</head>
<body>
  <div class="sp">
    <!-- Header -->
    <div class="sp-header">
      <div class="sp-brand">
        <img class="sp-logo" src="../icons/icon48.png" alt="HackExt">
        <div>
          <div class="sp-title">HackExt</div>
          <div class="sp-subtitle" id="spSubtitle">AI Sales Coach</div>
        </div>
      </div>
      <div class="sp-status" id="statusDot"><span class="sp-dot"></span> Ready</div>
    </div>

    <!-- Mode Bar (reply mode only) -->
    <div class="sp-modes" id="replyModes">
      <button class="sp-mode active" data-mode="auto">Auto</button>
      <button class="sp-mode" data-mode="objection">Objection</button>
      <button class="sp-mode" data-mode="follow_up">Follow Up</button>
      <button class="sp-mode" data-mode="close">Close</button>
      <button class="sp-mode" data-mode="re_engage">Re-engage</button>
    </div>

    <!-- Reply Mode Content (existing) -->
    <div class="sp-content" id="content">
      <div class="sp-empty">
        <div class="sp-empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="sp-empty-title">Select text to get started</div>
        <div class="sp-empty-desc">Highlight a prospect's message on any page, then click Reply or press <kbd>Ctrl+Shift+K</kbd></div>
      </div>
    </div>

    <!-- Score Mode Container (hidden by default) -->
    <div class="sp-score-container" id="scoreContainer" style="display: none;">
      <!-- Context banner -->
      <div class="sp-chat-context" id="scoreContext"></div>

      <!-- Score body (scrollable) -->
      <div class="sp-score-body" id="scoreBody">
        <!-- Loader or results injected by JS -->
      </div>
    </div>

    <!-- Chat Mode Container (hidden by default) -->
    <div class="sp-chat-container" id="chatContainer" style="display: none;">
      <!-- Context banner -->
      <div class="sp-chat-context" id="chatContext"></div>

      <!-- Chat messages -->
      <div class="sp-chat-messages" id="chatMessages"></div>

      <!-- Chat input -->
      <div class="sp-chat-input-area">
        <div class="sp-chat-input-wrap">
          <textarea id="chatInput" placeholder="Ask about this conversation..." rows="1"></textarea>
          <button class="sp-chat-send-btn" id="chatSendBtn" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 10l7-7m0 0l7 7m-7-7v18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="purify.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
